kind: ImageSetConfiguration
apiVersion: mirror.openshift.io/v2alpha1
mirror:
  platform:
    channels:
    - name: {channel}
    graph: true
  operators:
  - catalog: registry.redhat.io/redhat/redhat-operator-index:v{version}
    packages:
    - name: kubevirt-hyperconverged
    - name: odf-operator
    - name: nfd
  additionalImages:
  - name: registry.redhat.io/ubi8/ubi:latest
